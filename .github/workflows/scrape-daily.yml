name: Daily Scrape

on:
  # schedule:
  #   - cron: '0 15 * * *' # 22:00 Bangkok (UTC+7)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: scraper
        run: |
          uv sync
          uv run playwright install firefox

      - name: Restore cookie cache
        uses: actions/cache@v4
        with:
          path: scraper/cookies
          key: sega-cookies-${{ runner.os }}

      - name: Run scraper
        env:
          SEGA_USERNAME: ${{ secrets.SEGA_USERNAME }}
          SEGA_PASSWORD: ${{ secrets.SEGA_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        working-directory: scraper
        run: uv run python main.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/play-history.json
          git diff --cached --quiet || git commit -m "chore: daily scrape $(date -u +%Y-%m-%d)"
          git push
